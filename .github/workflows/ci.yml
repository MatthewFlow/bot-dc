name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

  # Core Web Vitals na zbudowanym panelu:
  #   • Lighthouse CI — LCP/CLS (lab) na publicznym landingu,
  #   • Playwright — INP (realne interakcje) na podstronie dashboardu z mockiem API.
  web-vitals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
        working-directory: apps/panel

      - name: Build panel
        run: bun run build
        working-directory: apps/panel
        env:
          # Origin API zapieczony w bundlu; Playwright mockuje API po ścieżce, więc wartość
          # jest dowolna (byle nie kolidowała z realnym serwerem).
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3999

      - name: Lighthouse CI (LCP / CLS — landing)
        run: bunx lhci autorun
        working-directory: apps/panel

      - name: Playwright (INP — dashboard)
        run: bunx playwright test
        working-directory: apps/panel
